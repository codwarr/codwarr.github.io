<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>اخبار کالاف وار</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    background: radial-gradient(circle at top, #1a1208, #0a0703);
    margin: 0;
    font-family: 'font', sans-serif;
    direction: rtl;
    color: #f5d99c;
}

/* عنوان صفحه */
.header {
    text-align: center;
    padding: 25px 0;
    font-size: 36px;
    color: #f7e7c1;
    text-shadow: 0 0 20px #d4a84f, 0 0 40px #b8860b;
    font-weight: bold;
    border-bottom: 2px solid #caa86b;
}

/* ظرف اخبار */
#news-container {
    width: 90%;
    margin: auto;
    padding-bottom: 200px;
}

/* کارت خبر */
.news-box {
    background: linear-gradient(180deg, rgba(50,35,15,0.95), rgba(20,10,5,0.9));
    border: 2px solid #d4a84f;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,215,130,0.3);
    padding: 25px;
    margin: 30px 0;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.news-box:hover {
    transform: scale(1.03);
    box-shadow: 0 0 45px rgba(255,215,130,0.5);
}

/* عنوان خبر */
.news-title {
    font-size: 26px;
    font-weight: bold;
    color: #f7e7c1;
    text-shadow: 0 0 10px #d4a84f;
    margin-bottom: 10px;
}

/* متن خبر */
.news-text {
    font-size: 18px;
    line-height: 32px;
    margin-bottom: 15px;
}

/* زمان خبر */
.news-time {
    font-size: 15px;
    color: #d4a84f;
    text-shadow: 0 0 8px #b8860b;
    display: flex;
    align-items: center;
    gap: 5px;
}
.news-time::before {
    content: "⏳";
    font-size: 18px;
}

/* عکس‌ها */
.news-images img {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
    border: 2px solid #caa86b;
    box-shadow: 0 0 15px rgba(255,215,130,0.3);
}

/* ویدیو */
.news-images video {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
    border: 2px solid #caa86b;
    box-shadow: 0 0 15px rgba(255,215,130,0.3);
}
</style>
</head>

<body>

<div class="header">اخبار کالاف وار ⚔️</div>

<div id="news-container"></div>

<script>
fetch("news-data.txt")
    .then(res => res.text())
    .then(data => {
        let lines = data.split("\n");
        let html = "";

        lines.forEach(line => {
            if (line.trim() !== "") {
                let parts = line.split("|");

                let title = parts[0] || "";
                let text  = parts[1] || "";
                let imgs  = parts[2] || "none";
                let vids  = parts[3] || "none";
                let rawTime = parts[4];

                // زمان خودکار
                let time;
                if (!rawTime || rawTime === "auto") {
                    const now = new Date();
                    time = now.toLocaleString("fa-IR");
                } else {
                    time = rawTime;
                }

                // عکس‌ها
                let imgHtml = "";
                if (imgs && imgs !== "none" && imgs.trim() !== "") {
                    imgs.split(",").forEach(src => {
                        src = src.trim();
                        if (src !== "") {
                            imgHtml += `<img src="${src}">`;
                        }
                    });
                }

                // ویدیوها (فقط اگر واقعاً لینک هست)
                let vidHtml = "";
                if (vids && vids !== "none" && vids.trim() !== "") {
                    vids.split(",").forEach(src => {
                        src = src.trim();
                        if (src !== "") {
                            vidHtml += `<video controls src="${src}"></video>`;
                        }
                    });
                }

                html += `
                    <div class="news-box">
                        <div class="news-title">${title}</div>
                        ${text && text !== "none" ? `<div class="news-text">${text}</div>` : ""}
                        <div class="news-images">${imgHtml}${vidHtml}</div>
                        <div class="news-time">${time}</div>
                    </div>
                `;
            }
        });

        document.getElementById("news-container").innerHTML = html;

        // اسکرول به پایین‌ترین خبر (جدیدترین)
        window.scrollTo(0, document.body.scrollHeight);
    });
</script>

</body>
</html>

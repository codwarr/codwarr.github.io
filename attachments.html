<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>اتچمنت‌ها</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    background: radial-gradient(circle at top, #1a1208, #0a0703);
    margin: 0;
    font-family: 'font', sans-serif;
    direction: rtl;
    color: #f5d99c;
    text-align: center;
}

/* عنوان */
.header {
    font-size: 36px;
    color: #f7e7c1;
    text-shadow: 0 0 20px #d4a84f, 0 0 40px #b8860b;
    padding: 25px 0;
    font-weight: bold;
}

/* دکمه‌های انتخاب مود */
.mode-btn {
    background: linear-gradient(180deg, rgba(80,60,30,0.95), rgba(40,25,10,0.9));
    border: 2px solid #d4a84f;
    border-radius: 15px;
    padding: 20px;
    margin: 20px auto;
    width: 85%;
    font-size: 24px;
    color: #f7e7c1;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255,215,130,0.25);
    transition: 0.3s;
}

.mode-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,215,130,0.45);
}

/* باکس اتچمنت‌ها */
#attachment-box {
    margin-top: 30px;
    width: 90%;
    margin-left: auto;
    margin-right: auto;
}

/* کارت اتچمنت */
.att-card {
    background: linear-gradient(180deg, rgba(60,45,20,0.95), rgba(30,20,10,0.9));
    border: 2px solid #d4a84f;
    border-radius: 15px;
    padding: 20px;
    margin: 25px 0;
    box-shadow: 0 0 25px rgba(255,215,130,0.25);
    text-align: center;
}

.att-card img {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
    border: 2px solid #caa86b;
    box-shadow: 0 0 15px rgba(255,215,130,0.3);
}

.att-title {
    font-size: 26px;
    font-weight: bold;
    color: #f7e7c1;
    text-shadow: 0 0 10px #d4a84f;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="header">اتچمنت‌ها ⚔️</div>

<!-- دکمه‌های انتخاب مود -->
<div class="mode-btn" onclick="loadMode('multi')">اتچمنت‌های مولتی ⚔️</div>
<div class="mode-btn" onclick="loadMode('br')">اتچمنت‌های بتل رویال 🛡️</div>

<!-- باکس نمایش اتچمنت‌ها -->
<div id="attachment-box"></div>

<script>
function loadMode(mode) {
    fetch("attachments-data.txt")
        .then(res => res.text())
        .then(data => {
            let lines = data.split("\n");
            let html = "";

            lines.forEach(line => {
                if (line.trim() !== "") {
                    let parts = line.split("|");

                    let title = parts[0];
                    let img = parts[1];
                    let type = parts[2]; // multi یا br

                    if (type === mode) {
                        html += `
                            <div class="att-card">
                                <div class="att-title">${title}</div>
                                <img src="${img}">
                            </div>
                        `;
                    }
                }
            });

            document.getElementById("attachment-box").innerHTML = html;
        });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>کالاف وار</title>

<!-- لود سریع بک‌گراند -->
<link rel="preload" href="https://cdn.imgurl.ir/uploads/i789703_1.jpg" as="image">

<style>
@font-face {
    font-family: 'myfont';
    src: url('font.ttf');
}

/* بک‌گراند + لایه تاریک کم */
body {
    margin: 0;
    padding: 0;
    background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("https://cdn.imgurl.ir/uploads/i789703_1.jpg") no-repeat center center fixed;
    background-size: cover;
    font-family: 'myfont';
    color: #e8c98a;
}

/* دکمه صدا */
.music-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 45px;
    height: 45px;
    background: #000000aa;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0c27a;
    font-size: 22px;
    cursor: pointer;
    z-index: 9999;
}

/* بخش بالای صفحه */
.header-box {
    position: relative;
    width: 100%;
    overflow: hidden;
    z-index: 10;
}

/* اینجا لینک اینترنتی جایگزین 1.jpg شده */
.header-img {
    width: 100%;
    display: block;
    filter: brightness(80%) contrast(120%) saturate(110%);
}
</style>
</head>

<body>

<!-- موزیک فقط اینجا -->
<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="music-btn" onclick="toggleMusic()">🔊</div>

<script>
function toggleMusic() {
    const m = document.getElementById("bgMusic");
    if (m.paused) m.play();
    else m.pause();
}
</script>

<div class="header-box">
    <!-- اینجا لینک اینترنتی گذاشتم -->
    <img src="https://cdn.imgurl.ir/uploads/i789703_1.jpg" class="header-img">

    <div class="overlay">
        <h1 class="title">کالاف وار</h1>
        <h2 class="subtitle">خفن ترین اتچمنت ها و اخبار با ما</h2>

        <a class="btn" href="attachments.html">اتچمنت‌ها ⚔️</a>
        <a class="btn" href="news.html">اخبار 📝</a>
        <a class="btn btn-bale" href="https://ble.ir/cod_war" target="_blank">ورود به چنل بله</a>
    </div>
</div>

</body>
</html>
